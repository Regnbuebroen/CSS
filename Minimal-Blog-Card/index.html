<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Blog Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            width: 368px;
            height: 388px;
            margin: 164px auto 0;
            box-shadow: 8px 8px 20px 0px rgba(85, 85, 85, 0.08);
            border-radius: 16px;
        }
        img {
            margin: 16px;
            border-radius: 16px;
        }
        .tag {
            width: 66px;
            height: 26px;
            margin-left: 16px;
            background-color: #F2EAFD;
            color: #7C19EE;
            font-size: 10px;
            font-weight: 800;
            line-height: 26px;
            text-align: center;
            border-radius: 16px;
        }
        .title {
            margin: 16px 0 0 16px;
            font-size: 18px;
            font-weight: 800;
            color: #20293A;
        }
        .content {
            margin: 6px 16px 20px;
            font-size: 14px;
            color: #394150;
        }
        hr {
            border: 0;
            height: 1px;
            background: #E5EAF0;
        }
        .name {
            margin: 20px 0 20px 16px;
            font-size: 12px;
            color: #394150;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./素材/Minimal Blog Card/Cactus.jpg" alt="">
        <div class="tag">Design</div>
        <p class="title">Embracing Minimalism</p>
        <p class="content">From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
        <hr>
        <div class="name">Annie Spratt</div>
    </div>
</body>
</html>
